name: Deploy Haven

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: worker
        run: npm install
      - name: Generate wrangler config
        working-directory: worker
        run: |
          cat > wrangler.toml << EOF
          name = "${{ secrets.WORKER_NAME }}"
          main = "src/index.ts"
          compatibility_date = "2025-01-01"
          compatibility_flags = ["nodejs_compat"]
          account_id = "${{ secrets.CF_ACCOUNT_ID }}"

          [[d1_databases]]
          binding = "DB"
          database_name = "haven-db"
          database_id = "${{ secrets.D1_DATABASE_ID }}"

          [[r2_buckets]]
          binding = "FILES"
          bucket_name = "haven-files"
          EOF
      - name: Deploy worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@latest deploy
